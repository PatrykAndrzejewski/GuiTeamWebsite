<!DOCTYPE html>
<html lang="en">
    <head>
        <!--specifies the character encoding for the HTML document-->
        <meta charset="UTF-8">
        <title>RandomNumGen</title>
        <!--this links the html to the base stylesheet-->
        <link rel="stylesheet" href="../Css/stylesheet.css">
    </head>
    <body>
        <nav class="navbar">
            <a href="Home.html">Home</a>
            <a href="tictactoe.html">Tic Tac Toe</a>
            <a href="RPS.html">Rock Paper Scissors</a>
            <a href="RandomGen.html">Random Number Generator</a>
        </nav>
        <!--header for the site -->
        <h1>Welcome to the Random number generating Game</h1>

        <!--diffrent groups and ids that are later used in java script-->
        <div id="game-container-random">
            <p id="message">Guess a number between 1 - 100</p>
            <p id="attempts">Attempts: 0</p>

            <!--Adds an inpute from the player for the game and is later used in js ussing the id-->
            <input type="number" id="guess-input" min="1" max="100" placeholder="Enter your guess">
            <!--Main buttons to submit and play again the game-->
            <button id="submit-guess" class="game-button">Submit Guess</button>
            <button id="restart-button" class="game-button" style="display: none;">Play Again?</button>
        </div>
        <script src="../JavaScript/RandomGen.js"></script>
    </body>
</html>
